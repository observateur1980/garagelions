{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}GL Leads{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#374151">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GL Leads">
  <link rel="apple-touch-icon" href="{% static 'icons/apple-touch-icon.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32.png' %}">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ── Sticky header bar ── */
    .m-header {
      background: #374151;
      color: #fff;
      padding: max(env(safe-area-inset-top, 0px), 14px) 14px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .m-header .back-btn {
      background: none; border: none; color: #fff;
      font-size: 28px; line-height: 1;
      padding: 0 6px; margin-left: -4px;
      cursor: pointer;
    }
    .m-header h1 {
      margin: 0; font-size: 17px; font-weight: 600;
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .m-header .header-link {
      color: #d1d5db; font-size: 13px;
      padding: 6px 8px;
      text-decoration: none;
    }

    /* ── Content ── */
    .m-content {
      padding: 14px 14px calc(24px + env(safe-area-inset-bottom, 0px));
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-title {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: #9ca3af;
      margin: 0 0 10px;
      font-weight: 600;
    }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-new, .badge-draft { background: #f3f4f6; color: #374151; }
    .badge-contacted, .badge-appointment_set, .badge-quoted,
    .badge-waiting_for_estimate, .badge-follow_up { background: #eff6ff; color: #1d4ed8; }
    .badge-closed_won { background: #ecfdf5; color: #047857; }
    .badge-closed_lost { background: #fef2f2; color: #b91c1c; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 12px 18px;
      border-radius: 8px; font-weight: 600; font-size: 15px;
      border: none; cursor: pointer; text-align: center;
      min-height: 44px;
      text-decoration: none;
    }
    .btn-primary { background: #374151; color: #fff; }
    .btn-primary:active { background: #1f2937; }
    .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-outline:active { background: #f3f4f6; }

    /* ── Inputs ── */
    .input,
    select.input,
    textarea.input,
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;            /* prevents iOS auto-zoom */
      background: #fff;
      color: #111827;
      font-family: inherit;
      -webkit-appearance: none;
    }
    select.input {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%236b7280' d='M6 8L0 0h12z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 38px;
    }
    textarea.input { resize: vertical; min-height: 80px; }
    .form-label {
      display: block; font-size: 13px; color: #374151;
      font-weight: 500; margin-bottom: 6px;
    }
  </style>
</head>
<body>

  {% block body %}{% endblock %}

  <script>
    // PWA: register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(() => {});
      });
    }
  </script>
</body>
</html>
