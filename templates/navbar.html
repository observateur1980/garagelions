{% load static %}
<style>
    .header-9 .mega-menu .menu-links > li > a,
.mega-menu .menu-links > li > a {
    color: #626262;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    font-weight: 600;
}

.icon-bar {
    width: 100%;
    background-color: #626262;
    overflow: auto;
}

.icon-bar a {
    float: right;
    padding: 9px 0;
    transition: all 0.3s ease;
    color: #ffffff;
    font-size: 16px;
    margin-right: 30px;
}

.header-9 .mega-menu > section.menu-list-items {
    border-bottom: 1px solid rgb(76, 73, 73);
    height: 96px;
    background: transparent;
}

.header-9 .mega-menu.desktopTopFixed .menu-list-items {
    background: #ffffff;
    border-bottom: 1px solid rgb(76, 73, 73);
}

.gl-nav-shell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 96px;
}

.gl-nav-left,
.gl-nav-right {
    flex: 1 1 0;
}

.gl-nav-left .menu-links,
.gl-nav-right .menu-links {
    display: flex !important;
    align-items: center !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 96px;
}

.gl-nav-left .menu-links {
    justify-content: flex-start !important;
}

.gl-nav-right .menu-links {
    justify-content: flex-end !important;
}

.gl-nav-left .menu-links > li,
.gl-nav-right .menu-links > li {
    float: none !important;
    display: flex !important;
    align-items: center !important;
    height: 96px;
}

.gl-nav-center {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 96px;
    padding: 0 24px;
}

.gl-nav-center a {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 96px;
}

.gl-nav-center img {
    height: 78px;
    width: auto;
    display: block;
}

.menu-links > li > a {
    display: flex !important;
    align-items: center !important;
    height: 96px;
    line-height: 1 !important;
}

.req-bar-on-menu {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    float: none !important;
    height: 44px !important;
    padding: 0 18px !important;
    margin: 0 0 0 12px !important;
    line-height: 1 !important;
    font-weight: bold;
    background-color: transparent;
    border: 1px solid #4c4949;
    border-radius: 4px;
    vertical-align: middle;
    position: relative;
    top: 0;
}

.mobile-logo {
    display: none;
}

@media screen and (max-width: 992px) {
    .gl-nav-shell {
        display: block;
        height: 70px;
    }

    .gl-nav-left,
    .gl-nav-right,
    .gl-nav-center {
        display: none;
    }

    .mobile-logo {
        display: block;
        text-align: center;
        padding-top: 6px;
    }

    .mobile-logo img {
        height: 58px;
        width: auto;
    }

    .mega-menu > section.menu-list-items {
        position: fixed;
        height: 70px;
    }

    .icon-bar a {
        margin-right: 15px;
        font-size: 14px;
    }
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

                            <div class="mobile-logo">
                                <a href="{% url 'home' %}">
                                    <img src="{% static 'images/logo-dark.png' %}" alt="Garage Lions logo">
                                </a>
                            </div>

                            <div class="gl-nav-shell">
                                <div class="gl-nav-left">
                                    <ul class="menu-links">

                                        <li>
                                            <a href="#">Products <i class="fa fa-angle-down fa-indicator"></i></a>
                                            <ul class="drop-down-multilevel">
                                                <li><a href="{% url 'garage' %}">Garage Remodeling</a></li>
                                                <li><a href="{% url 'garage' %}">Garage Cabinets</a></li>
                                                <li><a href="{% url 'garage' %}">Garage Flooring</a></li>
                                                <li><a href="{% url 'garage' %}">Lighting & Electrical</a></li>
                                                <li><a href="{% url 'garage' %}">Attic Storage</a></li>

                                            </ul>
                                        </li>
                                        <li><a href="{% url 'projects' %}">Projects</a></li>
                                    </ul>
                                </div>

                                <div class="gl-nav-center">
                                    <a href="{% url 'home' %}">

                                    </a>
                                </div>

                                <div class="gl-nav-right">
                                    <ul class="menu-links">
                                        <li>
                                            <a href="#">Videos <i class="fa fa-angle-down fa-indicator"></i></a>
                                            <ul class="drop-down-multilevel">
                                                <li><a href="{% url 'video' %}">Videos</a></li>
                                                <li><a href="{% url 'videoreviews' %}">Video Reviews</a></li>
                                            </ul>
                                        </li>
                                        <li><a href="{% url 'create_lead' %}">Contact</a></li>

                                    </ul>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </section>
        </nav>
    </div>
</header>
