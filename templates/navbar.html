{% load static %}
<style>



.header-9 .mega-menu > section.menu-list-items,
.header-9 .mega-menu.desktopTopFixed .menu-list-items {
    border-bottom: 1px solid rgb(76, 73, 73);
    height: 96px;
    background: whitesmoke;

}

  .header-9 .mega-menu > section.menu-list-items {
  background: transparent;
      opacity: 100%;
}

.header-9 .mega-menu .menu-links > li > a,
.mega-menu .menu-links > li > a {
    color: #c64d1e;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    font-weight: 600;
    letter-spacing: 0.4px;


}

.icon-bar {
    width: 100%;
    background-color: #626262;
    overflow: auto;
}

.icon-bar a {
    float: right;
    padding: 9px 0;
    transition: all 0.3s ease;
    color: #ffffff;
    font-size: 16px;
    margin-right: 30px;
}



.gl-nav-shell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 96px;
}

.gl-nav-left,
.gl-nav-right {
    flex: 1 1 0;
    min-width: 0;
}

.gl-nav-left .menu-links,
.gl-nav-right .menu-links {
    display: flex !important;
    align-items: center !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 96px;
}

.gl-nav-left .menu-links {
    justify-content: flex-end !important;
    padding-right: 42px !important;
}

.gl-nav-right .menu-links {
    justify-content: flex-start !important;
    padding-left: 42px !important;
}

.gl-nav-left .menu-links > li,
.gl-nav-right .menu-links > li {
    float: none !important;
    display: flex !important;
    align-items: center !important;
    height: 96px;
    position: relative;
}

.gl-nav-center {
    flex: 0 0 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 96px;
    padding: 0 10px;
    position: relative;
    z-index: 20;
}

.gl-nav-center a {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 96px;
}

.gl-nav-center img {
    height: 78px;
    width: auto;
    display: block;
}

.menu-links > li > a {
    display: flex !important;
    align-items: center !important;
    height: 96px;
    line-height: 1 !important;
    padding: 0 14px !important;
    white-space: nowrap;
}

.req-bar-on-menu {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    float: none !important;
    height: 44px !important;
    padding: 0 18px !important;
    margin: 0 0 0 12px !important;
    line-height: 1 !important;
    font-weight: bold;
    background-color: transparent;
    border: 1px solid #4c4949;
    border-radius: 4px;
    vertical-align: middle;
    position: relative;
    top: 0;
    white-space: nowrap;
}

.mega-menu .drop-down-multilevel {
    min-width: 240px;
    z-index: 9999 !important;
    top: 100% !important;
    left: 0 !important;
    right: auto !important;
}

.mobile-logo,
.mobile-menu-toggle,
.mobile-menu-panel {
    display: none;
}

.mobile-menu-toggle {
    position: absolute;
    right: 15px;
    top: 18px;
    width: 42px;
    height: 42px;
    border: 1px solid #4c4949;
    background: transparent;
    border-radius: 4px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10001;
}

.mobile-menu-toggle i {
    font-size: 20px;
    color: #4c4949;
}

.mobile-menu-panel {
    background: #ffffff;
    border-top: 1px solid #d9d9d9;
    padding: 10px 0;
}

.mobile-menu-panel ul {
    list-style: none;
    margin: 0;
    padding: 0;
}

.mobile-menu-panel li {
    margin: 0;
    padding: 0;
}

.mobile-menu-panel a {
    display: block;
    padding: 12px 20px;
    color: #626262;
    font-family: Arial, sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    border-bottom: 1px solid #eeeeee;
}

.mobile-submenu {
    padding-left: 15px;
}

@media screen and (max-width: 1200px) {
    .gl-nav-center {
        flex-basis: 190px;
    }

    .gl-nav-left .menu-links {
        padding-right: 24px !important;
    }

    .gl-nav-right .menu-links {
        padding-left: 24px !important;
    }

    .menu-links > li > a {
        padding: 0 10px !important;
        font-size: 13px;
    }

    .req-bar-on-menu {
        padding: 0 14px !important;
    }
}

@media screen and (max-width: 992px) {
    .gl-nav-shell {
        display: none;
    }

    .header-9 .mega-menu > section.menu-list-items,
    .header-9 .mega-menu.desktopTopFixed .menu-list-items {
        position: fixed;
        height: 78px;
        width: 100%;
        left: 0;
        top: 0;
        z-index: 9999;
        background: transparent;
    }

    .mobile-logo {
        display: block;
        text-align: center;
        padding-top: 8px;
    }

    .mobile-logo img {
        height: 58px;
        width: auto;
    }

    .mobile-menu-toggle {
        display: flex;
    }

    .mobile-menu-panel.is-open {
        display: block;
        position: fixed;
        top: 78px;
        left: 0;
        right: 0;
        z-index: 9998;
        max-height: calc(100vh - 78px);
        overflow-y: auto;
    }

    .icon-bar {
        display: none;
    }
}
</style>

                            <div id="mobileMenuPanel" class="mobile-menu-panel">

                    </div>

        </nav>
