{# Shared follow-up reminder modal + styles + JS. Include once per page. #}
{# Triggers: any element with class `fu-btn` and data-lead-id (and optional data-lead-name, data-has-reminder). #}

<!-- Follow-Up Reminder Modal -->
<div id="fu-modal" role="dialog" aria-modal="true" aria-labelledby="fu-modal-title" hidden
     style="position:fixed; inset:0; background:rgba(15,23,42,0.55); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px">
  <div style="background:#fff; border-radius:10px; max-width:440px; width:100%; padding:20px 22px; box-shadow:0 10px 32px rgba(0,0,0,0.25)">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px">
      <div>
        <h3 id="fu-modal-title" style="margin:0; font-size:17px; color:#111827">Schedule Follow-Up Reminder</h3>
        <p id="fu-modal-sub" style="margin:4px 0 0; color:#6b7280; font-size:13px">Lead</p>
      </div>
      <button type="button" id="fu-close" aria-label="Close"
              style="border:0; background:transparent; font-size:22px; line-height:1; color:#9ca3af; cursor:pointer">×</button>
    </div>

    <label for="fu-datetime" style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px">When should we remind you?</label>
    <input type="datetime-local" id="fu-datetime"
           style="width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:14px; box-sizing:border-box">

    <label for="fu-note" style="display:block; font-size:13px; font-weight:600; color:#374151; margin:12px 0 6px">Note (optional)</label>
    <input type="text" id="fu-note" maxlength="255" placeholder="e.g. Call to confirm flooring color"
           style="width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:14px; box-sizing:border-box">

    <div id="fu-error" style="color:#b91c1c; font-size:13px; margin-top:10px; display:none"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:18px; gap:8px">
      <button type="button" id="fu-clear" class="btn-panel-outline" style="padding:8px 14px; font-size:13px; color:#b91c1c; border-color:#fecaca; display:none">Clear reminder</button>
      <div style="display:flex; gap:8px; margin-left:auto">
        <button type="button" id="fu-cancel" class="btn-panel-outline" style="padding:8px 14px; font-size:13px">Cancel</button>
        <button type="button" id="fu-save" class="btn-panel" style="padding:8px 16px; font-size:13px">Save reminder</button>
      </div>
    </div>
  </div>
</div>

<style>
  .fu-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 999px;
    color: #4b5563;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
    transition: background .12s, border-color .12s, color .12s;
  }
  .fu-btn:hover { background:#f3f4f6; color:#111827; border-color:#9ca3af; }
  .fu-btn[data-has-reminder="1"] {
    background: #fffbeb;
    border-color: #fbbf24;
    color: #b45309;
  }
  .fu-btn[data-has-reminder="1"]:hover {
    background: #fef3c7;
    border-color: #f59e0b;
    color: #92400e;
  }
  .fu-btn--icon {
    padding: 4px 6px;
    background: #fff;
  }
  .fu-when { font-weight: 600; white-space: nowrap; }
</style>

<script>
(function () {
  function getCookie(name) {
    const v = `; ${document.cookie}`;
    const p = v.split(`; ${name}=`);
    return p.length === 2 ? p.pop().split(";").shift() : "";
  }
  const csrf = getCookie("csrftoken");

  const modal = document.getElementById("fu-modal");
  const subEl = document.getElementById("fu-modal-sub");
  const dtEl = document.getElementById("fu-datetime");
  const noteEl = document.getElementById("fu-note");
  const errEl = document.getElementById("fu-error");
  const saveBtn = document.getElementById("fu-save");
  const cancelBtn = document.getElementById("fu-cancel");
  const closeBtn = document.getElementById("fu-close");
  const clearBtn = document.getElementById("fu-clear");

  let currentLeadId = null;
  let currentBtn = null;

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = msg ? "block" : "none";
  }

  function defaultRemindAt() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    d.setHours(10, 0, 0, 0);
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function nowLocalString() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function openModal(leadId, leadName, btn) {
    currentLeadId = leadId;
    currentBtn = btn;
    subEl.textContent = leadName ? `Lead: ${leadName}` : "";
    dtEl.min = nowLocalString();
    dtEl.value = defaultRemindAt();
    noteEl.value = "";
    showError("");
    clearBtn.style.display = "none";
    modal.hidden = false;

    fetch(`/panel/leads/${leadId}/followup/`, {
      headers: { "X-Requested-With": "XMLHttpRequest" },
      credentials: "same-origin",
    })
      .then((r) => r.json())
      .then((p) => {
        if (p && p.ok && p.followup) {
          dtEl.value = p.followup.remind_at;
          noteEl.value = p.followup.note || "";
          clearBtn.style.display = "inline-flex";
        }
      })
      .catch(() => {});

    setTimeout(() => dtEl.focus(), 50);
  }

  function closeModal() {
    modal.hidden = true;
    currentLeadId = null;
    currentBtn = null;
  }

  function updateButton(btn, followup) {
    if (!btn) return;
    if (followup) {
      btn.dataset.hasReminder = "1";
      const date = new Date(followup.remind_at);
      const opts = { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" };
      const label = date.toLocaleString(undefined, opts);
      let when = btn.querySelector(".fu-when");
      if (!when) {
        when = document.createElement("span");
        when.className = "fu-when";
        btn.appendChild(when);
      }
      when.textContent = label;
      btn.title = `Reminder set for ${followup.remind_at_display} — click to change`;
    } else {
      delete btn.dataset.hasReminder;
      const when = btn.querySelector(".fu-when");
      if (when) when.remove();
      btn.title = "Schedule a follow-up reminder";
    }
  }

  document.querySelectorAll(".fu-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      openModal(btn.dataset.leadId, btn.dataset.leadName, btn);
    });
  });

  cancelBtn.addEventListener("click", closeModal);
  closeBtn.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !modal.hidden) closeModal(); });

  saveBtn.addEventListener("click", async () => {
    if (!currentLeadId) return;
    const remindAt = dtEl.value;
    if (!remindAt) {
      showError("Please pick a date and time.");
      return;
    }
    if (new Date(remindAt) <= new Date()) {
      showError("Reminder must be in the future.");
      return;
    }
    showError("");
    saveBtn.disabled = true;
    try {
      const res = await fetch(`/panel/leads/${currentLeadId}/followup/set/`, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
          "X-CSRFToken": csrf,
          "X-Requested-With": "XMLHttpRequest",
        },
        body: new URLSearchParams({ remind_at: remindAt, note: noteEl.value }).toString(),
      });
      const payload = await res.json().catch(() => null);
      if (!res.ok || !payload || payload.ok !== true) {
        throw new Error((payload && payload.error) || "Could not save reminder.");
      }
      updateButton(currentBtn, payload.followup);
      closeModal();
    } catch (err) {
      showError(err.message || "Could not save reminder.");
    } finally {
      saveBtn.disabled = false;
    }
  });

  clearBtn.addEventListener("click", async () => {
    if (!currentLeadId) return;
    if (!confirm("Clear this follow-up reminder?")) return;
    saveBtn.disabled = true;
    try {
      const res = await fetch(`/panel/leads/${currentLeadId}/followup/clear/`, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "X-CSRFToken": csrf,
          "X-Requested-With": "XMLHttpRequest",
        },
      });
      const payload = await res.json().catch(() => null);
      if (!res.ok || !payload || payload.ok !== true) {
        throw new Error("Could not clear reminder.");
      }
      updateButton(currentBtn, null);
      closeModal();
    } catch (err) {
      showError(err.message || "Could not clear reminder.");
    } finally {
      saveBtn.disabled = false;
    }
  });
})();
</script>
