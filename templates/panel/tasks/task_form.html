{% extends "panel/base.html" %}
{% block title %}New Task{% endblock %}

{% block content %}
<div class="page-header">
  <h2>New Task in "{{ task_list.name }}"</h2>
</div>

<div class="card dashboard-card" style="max-width:500px">
  <div class="card-body panel-form">
    <form method="post">
      {% csrf_token %}
      <label>Title</label>
      <input type="text" name="title" required>

      <label>Notes</label>
      <textarea name="notes" rows="3"></textarea>

      <label>Due Date (optional)</label>
      <input type="date" name="due_date">

      <button type="submit" class="btn-panel">Create Task</button>
      <a href="{% url 'panel:task_list' %}" class="btn-panel-outline" style="margin-left:8px">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
