{% extends "panel/base.html" %}
{% block title %}Delete Project{% endblock %}

{% block content %}
<div class="card dashboard-card" style="max-width:500px">
  <div class="card-body">
    <h5>Delete "{{ project.name }}"?</h5>
    <p style="color:#6b7280">This action cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-danger">Delete</button>
      <a href="{% url 'panel:project_detail' project.pk %}" class="btn-panel-outline" style="margin-left:8px">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
