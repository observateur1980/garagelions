{% extends "panel/base.html" %}
{% block title %}{% if project %}Edit Project{% else %}New Project{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
  <h2>{% if project %}Edit Project{% else %}New Project{% endif %}</h2>
</div>

<div class="card dashboard-card" style="max-width:600px">
  <div class="card-body panel-form">
    <form method="post">
      {% csrf_token %}
      <label>Name</label>
      <input type="text" name="name" value="{{ project.name|default:'' }}" required>

      <label>Customer</label>
      <select name="customer" required>
        <option value="">Select customer...</option>
        {% for c in customers %}
        <option value="{{ c.pk }}" {% if project.customer_id == c.pk %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>

      <label>Status</label>
      <select name="status">
        <option value="not_started" {% if project.status == 'not_started' %}selected{% endif %}>Not Started</option>
        <option value="in_progress" {% if project.status == 'in_progress' %}selected{% endif %}>In Progress</option>
        <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
        <option value="canceled" {% if project.status == 'canceled' %}selected{% endif %}>Canceled</option>
      </select>

      <label>Description</label>
      <textarea name="description" rows="3">{{ project.description|default:'' }}</textarea>

      <button type="submit" class="btn-panel">{% if project %}Save Changes{% else %}Create Project{% endif %}</button>
      <a href="{% url 'panel:project_list' %}" class="btn-panel-outline" style="margin-left:8px">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
