{% extends "panel/base.html" %}

{% block title %}Help / Operator Guide{% endblock %}

{% block extra_css %}
<style>
  .help-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 28px;
    align-items: start;
    max-width: 1200px;
  }

  .help-toc {
    position: sticky;
    top: 12px;
    max-height: calc(100vh - 24px);
    overflow-y: auto;
    padding: 16px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #fafafa;
    font-size: 13px;
    line-height: 1.55;
  }
  .help-toc strong {
    display: block;
    margin-bottom: 8px;
    color: #374151;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .help-toc ul { padding-left: 18px; margin: 0; }
  .help-toc > ul { padding-left: 0; list-style: none; }
  .help-toc > ul > li > a { font-weight: 600; }
  .help-toc a {
    color: #374151;
    text-decoration: none;
  }
  .help-toc a:hover { text-decoration: underline; }

  .help-body {
    padding: 8px 4px 80px;
    line-height: 1.65;
    color: #1f2937;
    max-width: 820px;
  }
  .help-body h1 {
    font-size: 28px;
    margin: 0 0 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e5e7eb;
  }
  .help-body h2 {
    font-size: 21px;
    margin: 36px 0 12px;
    padding-top: 8px;
    border-top: 1px solid #f3f4f6;
  }
  .help-body h3 {
    font-size: 16px;
    margin: 24px 0 8px;
    color: #374151;
  }
  .help-body p { margin: 0 0 12px; }
  .help-body ul, .help-body ol { padding-left: 24px; margin: 0 0 12px; }
  .help-body li { margin-bottom: 4px; }
  .help-body code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: #374151;
  }
  .help-body pre {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
  }
  .help-body pre code {
    background: transparent;
    padding: 0;
  }
  .help-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 16px;
    font-size: 14px;
  }
  .help-body th, .help-body td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #e5e7eb;
    vertical-align: top;
  }
  .help-body th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
  }
  .help-body blockquote {
    margin: 12px 0;
    padding: 8px 14px;
    border-left: 3px solid #d1d5db;
    color: #4b5563;
    background: #fafafa;
  }
  .help-body hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 28px 0;
  }
  .help-body a {
    color: #1f2937;
    text-decoration: underline;
  }
  .help-body a:hover { color: #000; }
  .help-body em { color: #6b7280; }

  /* Anchor offset so deep links don't sit under the navbar. */
  .help-body :target {
    scroll-margin-top: 16px;
  }

  @media (max-width: 900px) {
    .help-layout { grid-template-columns: 1fr; }
    .help-toc { position: static; max-height: none; }
  }
</style>
{% endblock %}

{% block content %}
<div class="help-layout">
  <aside class="help-toc">
    <strong>Contents</strong>
    {{ toc_html|safe }}
  </aside>
  <article class="help-body">
    {{ body_html|safe }}
  </article>
</div>
{% endblock %}
