{% extends "panel/base.html" %}
{% block title %}New Invoice{% endblock %}

{% block content %}
<div class="page-header">
  <h2>New Invoice</h2>
</div>

<div class="card dashboard-card" style="max-width:600px">
  <div class="card-body panel-form">
    <form method="post">
      {% csrf_token %}
      <label>Title</label>
      <input type="text" name="title" required>

      <label>Customer</label>
      <select name="customer" required>
        <option value="">Select customer...</option>
        {% for c in customers %}
        <option value="{{ c.pk }}">{{ c }}</option>
        {% endfor %}
      </select>

      <label>Due Date</label>
      <input type="date" name="due_date">

      <label>Tax Rate (%)</label>
      <input type="number" name="tax_rate" step="0.01" value="0">

      <label>Notes</label>
      <textarea name="notes" rows="3"></textarea>

      <button type="submit" class="btn-panel">Create Invoice</button>
      <a href="{% url 'panel:invoice_list' %}" class="btn-panel-outline" style="margin-left:8px">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
